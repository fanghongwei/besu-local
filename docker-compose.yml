version: '3.8'

services:
  node1:
    image: hyperledger/besu:latest
    command:
      - --network=dev
      - --rpc-http-enabled
      - --rpc-http-api=ETH,NET,WEB3,ADMIN
      - --rpc-http-cors-origins=*
      - --host-allowlist=*
      - --p2p-host=172.28.0.11
      - --nat-method=NONE
      - --data-path=/opt/besu/data
    ports:
      - "8545:8545" # HTTP RPC
      - "30303:30303" # P2P Discovery
    volumes:
      - node1_data:/opt/besu/data
      - ./static-nodes-node1.json:/opt/besu/data/static-nodes.json
    networks:
      besu_net:
        ipv4_address: 172.28.0.11

  node2:
    image: hyperledger/besu:latest
    command:
      - --network=dev
      - --rpc-http-enabled
      - --rpc-http-api=ETH,NET,WEB3,ADMIN
      - --rpc-http-cors-origins=*
      - --host-allowlist=*
      - --p2p-host=172.28.0.12
      - --nat-method=NONE
      - --bootnodes=enode://d6513b4a725d0ad031ec1345f65512118ff1ff7d7ae7417ec87a34d640e5e0afaf0f08dbf80a6d32acef20fdd8b220cc9f66db7de0f9d109b864ceb0a82cd099@172.28.0.11:30303
      - --data-path=/opt/besu/data
    ports:
      - "8546:8545" # Shifted local port to avoid conflict
      - "30304:30303"
    volumes:
      - node2_data:/opt/besu/data
      - ./static-nodes-node2.json:/opt/besu/data/static-nodes.json
    networks:
      besu_net:
        ipv4_address: 172.28.0.12
    depends_on:
      - node1

